<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lotbo — Hors ligne</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100dvh;
      background: #F7F2E8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px 96px;
      text-align: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .icon { font-size: 56px; margin-bottom: 20px; }
    h1 {
      font-size: 22px;
      font-weight: bold;
      color: #1A1410;
      margin-bottom: 12px;
      line-height: 1.3;
    }
    h1 span { color: #C8431A; }
    p {
      font-size: 14px;
      color: #8C5A40;
      line-height: 1.7;
      max-width: 280px;
      margin-bottom: 8px;
    }
    p.sub {
      font-size: 12px;
      color: rgba(140,90,64,0.6);
      max-width: 240px;
    }
    button {
      margin-top: 28px;
      padding: 12px 28px;
      background: #C8431A;
      color: white;
      border: none;
      border-radius: 999px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1><span>Lotbo</span> est hors ligne</h1>
  <p>Vérifie ta connexion internet pour découvrir les événements près de toi.</p>
  <p class="sub">Les pages déjà visitées restent accessibles hors ligne.</p>
  <button onclick="location.reload()">Réessayer</button>
</body>
</html>
